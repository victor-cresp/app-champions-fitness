name: flutter_application_app_ranking
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.3
  http: ^1.6.0
  supabase_flutter: ^2.14.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4  

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/fundo_pedra.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true # Remove a transparência no iOS e coloca fundo branco
  adaptive_icon_background: "#1F1F1F" # Cor de fundo no Android
  adaptive_icon_foreground: "assets/logo.png" # A logo por cima da cor no Android