name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================
  # FLUTTER - Análise, Testes e Build (Web)
  # ============================================================
  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_application_app_ranking

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verificar versão do Flutter
        run: flutter --version

      - name: Instalar dependências
        run: flutter pub get

      - name: Análise estática (flutter analyze)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Verificar formatação (sem modificar arquivos)
        run: dart format --output=none --set-exit-if-changed .

      - name: Executar testes unitários
        run: flutter test --coverage

      - name: Criar .env dummy para o build
        run: echo -e "SUPABASE_URL=https://dummy.supabase.co\nSUPABASE_KEY=dummy-key" > .env

      - name: Build de verificação (Web - não requer Android SDK)
        run: flutter build web
        timeout-minutes: 15

  # ============================================================
  # PYTHON - Backend FastAPI
  # ============================================================
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx

      - name: Verificar sintaxe dos arquivos Python
        run: |
          python -m py_compile main.py
          echo "✅ main.py compila sem erros"

      - name: Lint com flake8
        run: |
          flake8 main.py --count --max-line-length=120 --statistics
        continue-on-error: true

      - name: Verificar importações (com env vars dummy)
        run: |
          python -c "
          import os, sys
          # Define env vars dummy para evitar RuntimeError do Supabase
          os.environ['SUPABASE_URL'] = 'https://dummy.supabase.co'
          os.environ['SUPABASE_KEY'] = 'dummy-key'

          sys.path.insert(0, '.')
          try:
              from main import app, PayloadTreino, calcular_distancia_metros
              print('✅ Todos os imports resolvidos com sucesso')
          except Exception as e:
              print(f'❌ Erro ao importar: {e}')
              sys.exit(1)
          "

      - name: Executar testes (se existirem)
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
            python -m pytest tests/ -v
          else
            echo "ℹ️ Nenhum teste encontrado em tests/. Pulando..."
          fi

  # ============================================================
  # VERIFICAÇÃO DE SEGURANÇA
  # ============================================================
  security-scan:
    name: Verificação de Segurança
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar ferramentas de segurança
        run: |
          pip install bandit safety

      - name: Scan Python com bandit
        run: |
          bandit -r main.py -f custom
        continue-on-error: true
